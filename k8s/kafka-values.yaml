# Bitnami Kafka Helm chart values (KRaft mode — no ZooKeeper)
# Install with:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm install kafka bitnami/kafka -f k8s/kafka-values.yaml -n judge-system

kraft:
  enabled: true

replicaCount: 1

controller:
  replicaCount: 1

listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT
  interbroker:
    protocol: PLAINTEXT

service:
  type: ClusterIP

# Topics to create on startup
provisioning:
  enabled: true
  topics:
    - name: code-submissions
      partitions: 4
      replicationFactor: 1
      config:
        retention.ms: "3600000"   # 1 hour
    - name: judge-results
      partitions: 4
      replicationFactor: 1
      config:
        retention.ms: "3600000"

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

persistence:
  size: 2Gi
