apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: judge-ingress
  namespace: judge-system
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8082
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
